name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  backend:
    name: Backend (lint + unit tests)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint (ruff)
        run: ruff check app tests

      - name: Typecheck (mypy)
        run: mypy app tests

      - name: Unit + API tests
        env:
          APP_ENV: local
        run: pytest

  backend-integration:
    name: Backend (integration tests, testcontainers)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run integration tests
        env:
          APP_ENV: local
        run: pytest -m integration

  frontend:
    name: Web + shared (typecheck + unit tests + build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install workspace dependencies
        run: npm ci

      - name: Typecheck (shared)
        run: npm run typecheck --workspace=@time2leave/shared

      - name: Typecheck (web)
        run: npm run typecheck --workspace=@time2leave/web

      - name: Unit tests (shared)
        run: npm run test --workspace=@time2leave/shared

      - name: Unit tests (web)
        run: npm run test --workspace=@time2leave/web

      - name: Build (web)
        run: npm run build --workspace=@time2leave/web

      - name: Typecheck (mobile)
        run: npm run typecheck --workspace=@time2leave/mobile
