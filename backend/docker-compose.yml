services:
  time2leave-api:
    image: time2leave-api:latest
    container_name: time2leave-api
    ports: ["8485:8000"]
    restart: unless-stopped
    environment:
      APP_ENV: "prod"
      AWS_PROFILE: "default"
      AWS_SDK_LOAD_CONFIG: "1"
      # MySQL lives in a sibling container named "mysql" on shared_network.
      # Credentials still come from AWS Secrets Manager (see app/config.py).
      # The app's lifespan startup runs db/init/001_schema.sql idempotently,
      # so flipping this to a new database name creates it on first boot
      # (no manual DBA step).
      MYSQL_HOST: "mysql"
      MYSQL_PORT: "3306"
      MYSQL_DATABASE: "time2leave"
      # Owner / first admin. Bootstrapped onto the auth_allowlist table on
      # every startup (idempotent INSERT IGNORE). ADMIN_EMAILS gates the
      # /api/v1/admin/* routes; AUTH_ALLOWLIST_BOOTSTRAP makes sure the
      # email can sign in even before the table has any other rows.
      ADMIN_EMAILS: "larskrjo@gmail.com"
      AUTH_ALLOWLIST_BOOTSTRAP: "larskrjo@gmail.com"
    healthcheck:
      test: ["CMD-SHELL", "python healthcheck.py"]
      interval: 5s
      timeout: 3s
      start_period: 3s
      retries: 20
    volumes:
      - ${HOME}/.aws:/root/.aws:ro
    networks:
      - shared_network

networks:
  shared_network:
    external: true
