services:
  api-traffic:
    image: api-traffic:latest
    container_name: api-traffic
    ports: ["8485:8000"]
    restart: unless-stopped
    environment:
      APP_ENV: "prod"
      AWS_PROFILE: "default"
      AWS_SDK_LOAD_CONFIG: "1"
      # MySQL lives in a sibling container named "mysql" on shared_network.
      # Credentials still come from AWS Secrets Manager (see app/config.py).
      MYSQL_HOST: "mysql"
      MYSQL_PORT: "3306"
      MYSQL_DATABASE: "traffic_larsjohansen_com"
    healthcheck:
      test: ["CMD-SHELL", "python healthcheck.py"]
      interval: 5s
      timeout: 3s
      start_period: 3s
      retries: 20
    volumes:
      - ${HOME}/.aws:/root/.aws:ro
    networks:
      - shared_network

networks:
  shared_network:
    external: true
