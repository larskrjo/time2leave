# Local development stack: mysql + backend API.
# Frontend is optional (see frontend service at the bottom) — most people
# run the Vite dev server on the host for fast HMR.
#
# Usage:
#   docker compose -f backend/docker-compose.dev.yml up -d
#   docker compose -f backend/docker-compose.dev.yml --profile full up -d   # include frontend
#   docker compose -f backend/docker-compose.dev.yml down -v                # wipe data
#
# Host port overrides (useful if 3306 / 8000 / 5173 are taken on your box):
#   MYSQL_HOST_PORT=3307 API_HOST_PORT=8000 FRONTEND_HOST_PORT=5173 \
#     docker compose -f backend/docker-compose.dev.yml up -d

services:
  mysql:
    image: mysql:8
    container_name: time2leave-mysql-dev
    restart: unless-stopped
    ports:
      - "${MYSQL_HOST_PORT:-3307}:3306"
    environment:
      MYSQL_ROOT_PASSWORD: Abcd1234
      MYSQL_DATABASE: time2leave
    volumes:
      - mysql_data:/var/lib/mysql
      - ./db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test:
        ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-pAbcd1234"]
      interval: 5s
      timeout: 3s
      start_period: 10s
      retries: 20

  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: time2leave-api:dev
    container_name: time2leave-api-dev
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "${API_HOST_PORT:-8000}:8000"
    # Single source of truth: edit backend/.env, then `docker compose ...
    # restart api`. Anything not set in .env falls back to defaults baked
    # into app/config.py.
    env_file:
      - .env
    environment:
      # Container-internal overrides only — these need different values
      # in-container than what backend/.env says for host-side tooling.
      # The api container talks to the mysql container by service name
      # on the standard 3306 port; the host-side .env points at
      # localhost:${MYSQL_HOST_PORT:-3307} for psql/mysql clients.
      MYSQL_HOST: mysql
      MYSQL_PORT: "3306"
    volumes:
      - ./app:/app/app
      - ./db:/app/db:ro
    command:
      [
        "uvicorn",
        "app.main:app",
        "--host",
        "0.0.0.0",
        "--port",
        "8000",
        "--reload",
      ]
    healthcheck:
      test: ["CMD-SHELL", "python healthcheck.py"]
      interval: 5s
      timeout: 3s
      start_period: 5s
      retries: 20

  # Optional containerized web dev server. Most contributors run
  # `npm run dev:web` on the host instead for faster HMR. Build context
  # is the repo root so `node_modules` resolves the @time2leave/shared
  # workspace symlink.
  frontend:
    profiles: ["full"]
    image: node:20-alpine
    container_name: time2leave-web-dev
    working_dir: /repo
    ports:
      - "${FRONTEND_HOST_PORT:-5173}:5173"
    environment:
      VITE_API_BASE_URL: http://localhost:8000
    volumes:
      - ../:/repo
      - web_node_modules:/repo/node_modules
    command: sh -c "npm install && npm run dev --workspace=@time2leave/web -- --host 0.0.0.0"

volumes:
  mysql_data:
  web_node_modules:
