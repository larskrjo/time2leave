<?xml version="1.0" encoding="UTF-8"?>
<!--
  time2leave favicon.

  Brand mark: rounded gradient tile (the same #1e40af -> #ef6c00 ramp used
  by the wordmark and primary CTAs) with a bold italic white "2", the
  signature glyph from the wordmark. Resolution-independent so it stays
  crisp from 16px (tab) up to 512px (PWA install icon).

  We use a system-font stack rather than Inter for the "2": browsers
  render favicons in a font-stripped sandbox, so embedding Inter wouldn't
  reach the user. system-ui falls back to whichever sans-serif the OS
  ships (San Francisco / Segoe UI / Roboto). Italic + weight 900 produce
  a recognisable bold italic "2" on every platform.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" role="img" aria-label="time2leave">
    <defs>
        <linearGradient id="t2lGrad" x1="0" y1="0" x2="32" y2="32" gradientUnits="userSpaceOnUse">
            <stop offset="0%" stop-color="#1e40af"/>
            <stop offset="100%" stop-color="#ef6c00"/>
        </linearGradient>
    </defs>
    <rect width="32" height="32" rx="7" ry="7" fill="url(#t2lGrad)"/>
    <text
        x="16"
        y="17"
        text-anchor="middle"
        dominant-baseline="central"
        font-family="system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif"
        font-size="22"
        font-weight="900"
        font-style="italic"
        fill="#ffffff"
        letter-spacing="-0.04em"
    >2</text>
</svg>
